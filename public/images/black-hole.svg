<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="bh-title bh-desc">
  <title id="bh-title">Black hole with accretion disk</title>
  <desc id="bh-desc">Stylized view of a black hole shadow surrounded by a glowing accretion disk</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9a3c" stop-opacity="0.15" />
      <stop offset="45%" stop-color="#e86b1f" stop-opacity="0.55" />
      <stop offset="72%" stop-color="#8b3a12" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#1a120e" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="disk" cx="50%" cy="50%" r="50%">
      <stop offset="58%" stop-color="#0a0a0a" />
      <stop offset="62%" stop-color="#1a0f08" />
      <stop offset="68%" stop-color="#c45a18" />
      <stop offset="74%" stop-color="#f0a040" />
      <stop offset="80%" stop-color="#e07020" />
      <stop offset="88%" stop-color="#5a2810" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0" />
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0d0d0d" />
  <circle cx="200" cy="200" r="185" fill="url(#glow)" filter="url(#blur)" />
  <ellipse cx="200" cy="200" rx="175" ry="52" fill="none" stroke="#f0a040" stroke-width="14" opacity="0.35" transform="rotate(-18 200 200)" />
  <ellipse cx="200" cy="200" rx="175" ry="52" fill="none" stroke="#e86b1f" stroke-width="8" opacity="0.5" transform="rotate(-18 200 200)" />
  <circle cx="200" cy="200" r="175" fill="url(#disk)" />
  <circle cx="200" cy="200" r="72" fill="#000" />
  <circle cx="200" cy="200" r="78" fill="none" stroke="#2a1810" stroke-width="3" opacity="0.6" />
  <ellipse cx="200" cy="188" rx="90" ry="22" fill="none" stroke="#ffcc80" stroke-width="2" opacity="0.25" transform="rotate(-18 200 200)" />
</svg>
